# Example pod that mounts a persistent volume and pins CPU/RAM limits.
#
# The PVC (orthomoe-pvc) holds the venv, Hugging Face caches and offload folder,
# so when this pod dies and a new one starts you only re-run `source
# scripts/env.sh` -- no reinstall, no re-download.
#
# The container `resources.limits.memory` MUST agree with the YAML config's
# `resources.max_cpu_ram_gb`; the in-process RAM guard trips just under the
# limit and raises a clean MemoryError instead of getting SIGKILL (exit 137).
#
#   kubectl apply -f k8s/orthomoe-pvc.yaml
#   kubectl apply -f k8s/orthomoe-pod.yaml
#   kubectl exec -it orthomoe -- bash -lc 'cd /workspace/orthogonal_moe_experiments && bash scripts/setup_env.sh'
#   kubectl exec -it orthomoe -- bash -lc 'cd /workspace/orthogonal_moe_experiments && bash scripts/run_all.sh configs/default_gemma4_26b.yaml gemma4_first_run'
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orthomoe-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 300Gi          # room for venv + HF cache + checkpoint offload
---
apiVersion: v1
kind: Pod
metadata:
  name: orthomoe
spec:
  restartPolicy: Never
  containers:
    - name: orthomoe
      image: nvcr.io/nvidia/pytorch:24.10-py3   # any CUDA + Python base image
      workingDir: /workspace/orthogonal_moe_experiments
      command: ["sleep", "infinity"]
      env:
        - name: ORTHOMOE_PVC
          value: /pvc/orthomoe        # caches + venv live here (on the PVC)
        # CUDA-matched torch wheel index for the one-time setup_env.sh install.
        - name: TORCH_INDEX_URL
          value: https://download.pytorch.org/whl/cu124
      resources:
        requests:
          cpu: "4"
          memory: 56Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "4"              # matches resources.num_threads in the config
          memory: 56Gi          # keep >= config max_cpu_ram_gb (e.g. 48) + headroom
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: pvc
          mountPath: /pvc
        - name: dshm
          mountPath: /dev/shm   # larger /dev/shm avoids dataloader shm OOMs
  volumes:
    - name: pvc
      persistentVolumeClaim:
        claimName: orthomoe-pvc
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 8Gi

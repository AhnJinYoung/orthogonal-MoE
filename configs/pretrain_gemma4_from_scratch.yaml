seed: 123

project:
  output_dir: outputs/gemma4_26b_a4b_scratch_orthomoe

model:
  model_id: google/gemma-4-26B-A4B
  init: scratch_from_config
  dtype: bfloat16
  trust_remote_code: true
  low_cpu_mem_usage: true
  device_map: null
  attn_implementation: sdpa

patch:
  enabled: true
  strategy: tensor_experts_auto
  collect_stats: true
  aux_ortho_coef: 0.0
  aux_positive_only: false

aggregation:
  name: top1_orthogonal
  lambda: 0.50
  positive_only: true
  stop_anchor: true
  preserve_norm: false

data:
  dataset_name: wikitext
  dataset_config_name: wikitext-103-raw-v1
  text_column: text
  train_split: train
  eval_split: validation
  block_size: 1024
  max_train_samples: 8192
  num_workers: 2

training:
  mode: scratch_from_config
  output_dir: outputs/gemma4_26b_a4b_scratch_orthomoe
  mixed_precision: bf16
  gradient_checkpointing: true
  micro_batch_size: 1
  gradient_accumulation_steps: 32
  max_steps: 1000
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 100
  lr_scheduler: cosine
  max_grad_norm: 1.0
  optimizer: adamw
  log_every: 10
  save_every: 500
  use_lora: false

seed: 42

project:
  output_dir: outputs/qwen35_35b_a3b_orthomoe

# CPU/RAM workload constraints to avoid exit code 137 (OOM) during loading.
resources:
  num_threads: 4
  max_cpu_ram_gb: 48
  cgroup_headroom_fraction: 0.9
  warn_fraction: 0.85
  abort_fraction: 0.95
  set_rlimit_data: false
  max_gpu_mem_gb: null
  cpu_weight_fraction: 0.7
  offload_folder: null
  offload_state_dict: true

model:
  # Use Qwen/Qwen3.5-35B-A3B for chat/instruction experiments.
  model_id: Qwen/Qwen3.5-35B-A3B-Base
  init: pretrained
  dtype: bfloat16
  trust_remote_code: true
  low_cpu_mem_usage: true
  device_map: auto
  attn_implementation: sdpa
  allow_multimodal_fallback: true
  quantization: null

patch:
  enabled: true
  strategy: tensor_experts_auto
  collect_stats: true
  module_name_regex: null
  patch_modulelist_blocks: true
  aux_ortho_coef: 0.0
  aux_positive_only: false

aggregation:
  name: standard

variants:
  - name: standard
    aggregation: {name: standard}
  - name: top1_pos_lam025
    aggregation: {name: top1_orthogonal, lambda: 0.25, positive_only: true, stop_anchor: true}
  - name: top1_pos_lam050
    aggregation: {name: top1_orthogonal, lambda: 0.50, positive_only: true, stop_anchor: true}
  - name: novelty_gated_alpha1
    aggregation: {name: novelty_gated, novelty_alpha: 1.0, positive_only: true}
  - name: gram_schmidt_lam050
    aggregation: {name: gram_schmidt, lambda: 0.50}
  - name: whitening_lam025
    aggregation: {name: whitening, lambda: 0.25, preserve_norm: true}

data:
  dataset_name: wikitext
  dataset_config_name: wikitext-103-raw-v1
  text_column: text
  train_split: train
  eval_split: validation
  block_size: 1024
  max_eval_samples: 256
  max_train_samples: 4096
  num_workers: 0
  streaming: false
  map_num_proc: 1
  map_batch_size: 256
  writer_batch_size: 256
  pin_memory: true

eval:
  batch_size: 1
  max_batches: 64
  compute_logit_metrics: true
  logit_chunk_size: 2048
  logit_sample_cap: 50000
  logit_sample_stride: 1

training:
  mode: continue_pretrain
  output_dir: outputs/qwen35_35b_a3b_continue_pretrain
  mixed_precision: bf16
  gradient_checkpointing: true
  micro_batch_size: 1
  gradient_accumulation_steps: 16
  max_steps: 1000
  learning_rate: 2.0e-5
  weight_decay: 0.1
  warmup_steps: 50
  lr_scheduler: cosine
  max_grad_norm: 1.0
  optimizer: adamw
  log_every: 10
  save_every: 500
  use_lora: true
  prepare_kbit: false
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    bias: none
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
